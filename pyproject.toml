[project]
name = "vision3d"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
authors = [{ name = "Peter Siegel", email = "psiegel2000@icloud.com" }]
dependencies = [
  "torch>=2.6",
  "torchvision>=0.21",
]

[project.optional-dependencies]
viz = [
    "rerun-sdk>=0.31.1",
]

[dependency-groups]
dev = [
  "pyrefly>=0.59.1",
  "pytest>=9.0.2",
  "ruff>=0.15.9",
]

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"

[tool.pyrefly]
min-severity = "ignore"
search_path = ["test"]

[tool.pyrefly.errors]
# Pyrefly does not yet have a strict mode, so we manually set all diagnostics
# with "ignore" severity levels to "warn".
implicit-abstract-class = "warn"
implicit-any = "warn"
implicitly-defined-attribute = "warn"
missing-override-decorator = "warn"
missing-source = "warn"
not-required-key-access = "warn"
open-unpacking = "warn"
unannotated-attribute = "warn"
unannotated-parameter = "warn"
unannotated-return = "warn"
untyped-import = "warn"
unused-ignore = "warn"

[tool.ruff.lint]
preview = true
extend-select = ["D", "DOC", "PT", "TC"]
ignore = [
  "D104",  # TODO: remove, missing docstring in placeholder __init__.py packages
]

[tool.ruff.lint.per-file-ignores]
"test/**" = ["D"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
docstring-code-format = true

[pytest]
addopts = ["--import-mode=importlib"]
