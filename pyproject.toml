[project]
name = "vision3d"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Peter Siegel", email = "psiegel2000@icloud.com" }
]
requires-python = ">=3.14"
dependencies = [
    "torch>=2.6",
    "torchvision>=0.21",
]

[tool.pyrefly]
min-severity = "ignore"

[tool.pyrefly.errors]
# Pyrefly does not yet have a strict mode, so we manually set all diagnostics
# with "ignore" severity levels to "warn".
implicit-abstract-class = "warn"
implicit-any = "warn"
implicitly-defined-attribute = "warn"
missing-override-decorator = "warn"
missing-source = "warn"
not-required-key-access = "warn"
open-unpacking = "warn"
unannotated-attribute = "warn"
unannotated-parameter = "warn"
unannotated-return = "warn"
untyped-import = "warn"
unused-ignore = "warn"

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pyrefly>=0.59.1",
    "pytest>=9.0.2",
]
