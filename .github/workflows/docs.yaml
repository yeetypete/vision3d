name: docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: pytorch/manylinux2_28-builder:cuda13.0
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    env:
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;9.0;10.0;12.0+PTX"
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Install system dependencies
        run: |
          yum install -y \
            libSM \
            libXext \
            libXrender \
            libxcb \
            mesa-libGL
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: true
          cache-local-path: ${{ github.workspace }}/.uv-cache
          cache-suffix: docs
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - name: Cache nuScenes mini
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/vision3d/nuscenes-mini
          key: nuscenes-mini-v1.0
      - name: Cache KITTI mini
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/vision3d/kitti-mini
          key: kitti-mini-10frames
      - name: Build docs
        run: uv run make -C docs html
      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-html
          path: docs/build/html
          if-no-files-found: error
          retention-days: 5

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docs-html
          path: html
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy html --project-name=vision3d --branch=main
