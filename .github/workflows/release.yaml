name: release
run-name: release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1). Must match version.txt."
        type: string
        required: true

permissions: {}

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Verify input matches version.txt
        run: |
          input="${{ github.event.inputs.version }}"
          repo="$(cat version.txt)"
          if [ "$input" != "$repo" ]; then
            echo "::error::Input version (${input}) does not match version.txt (${repo}). Bump version.txt on main first."
            exit 1
          fi

  lint:
    needs: verify
    permissions:
      contents: read
    uses: ./.github/workflows/lint.yaml
    with:
      cache: false

  test:
    needs: verify
    permissions:
      contents: read
    uses: ./.github/workflows/test.yaml
    with:
      cache: false

  build:
    needs: verify
    permissions:
      contents: read
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ inputs.version }}
      cache: false

  announce:
    name: Create GitHub release
    needs: [lint, test, build]
    runs-on: ubuntu-24.04
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ inputs.version }}"
          gh release create "$tag" \
            --target "${{ github.sha }}" \
            --title "$tag" \
            --generate-notes \
            dist/*

  publish-pypi:
    name: Publish release to PyPI
    needs: announce
    runs-on: ubuntu-24.04
    environment:
      name: release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - name: Publish
        run: uv publish
