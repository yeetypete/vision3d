name: lint

on:
  workflow_call:
    inputs:
      cache:
        description: "Whether the build should be cached."
        type: boolean
        default: true

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8
        with:
          enable-cache: ${{ inputs.cache }}
          cache-local-path: ${{ runner.temp }}/uv-cache
          cache-suffix: lint
      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups --no-install-project
      - name: Ruff lint
        run: uv run ruff check
      - name: Ruff format
        run: uv run ruff format --check
      - name: Pyrefly typecheck
        run: uv run pyrefly check

  clang-tidy:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu24.04
    permissions:
      contents: read
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates cmake curl git gnupg lsb-release make software-properties-common sudo wget
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install clang-tidy 22
        run: |
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          bash llvm.sh 22
          apt-get install -y --no-install-recommends clang-tidy-22 clang-tools-22
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8
        with:
          enable-cache: ${{ inputs.cache }}
          cache-local-path: ${{ runner.temp }}/uv-cache
          cache-suffix: tidy
      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups --no-install-project
      - name: clang-tidy
        run: make tidy
