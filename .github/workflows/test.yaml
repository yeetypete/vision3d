name: test

on:
  workflow_call:
    inputs:
      cache:
        description: "Whether the build should be cached."
        type: boolean
        default: true

permissions: {}

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxcb1 \
            libxext6 \
            libxrender1 \
            ninja-build
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          python-version: "3.14"
          enable-cache: ${{ inputs.cache }}
          cache-local-path: ${{ github.workspace }}/.uv-cache
          cache-suffix: test-cpu
      - name: Install project
        run: uv sync --locked --all-extras
      - name: Run CPU tests
        run: uv run pytest -m cpu
