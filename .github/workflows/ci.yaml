name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.8.1-devel-ubuntu24.04 # TODO: use custom image which contains all build dependencies
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git \
            libgl1 \
            libxcb1 \
            ninja-build
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-extras --no-install-project
      - name: Ruff lint
        run: uv run ruff check
      - name: Ruff format
        run: uv run ruff format --check
      - name: Pyrefly typecheck
        run: uv run pyrefly check

  test:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:${{ matrix.cuda-version }}-devel-ubuntu24.04 # TODO: use custom image which contains all build dependencies
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    env:
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;9.0;10.0;12.0+PTX"
    strategy:
      fail-fast: false
      matrix: &torch-matrix
        python-version: ["3.12", "3.13", "3.14"]
        torch-version: ["2.9.1", "2.11.0"]
        include:
          - torch-version: "2.9.1"
            cuda-version: "12.8.1"
            cuda-tag: "cu128"
          - torch-version: "2.11.0"
            cuda-version: "13.0.2"
            cuda-tag: "cu130"
    name: "test (py${{ matrix.python-version }}, torch ${{ matrix.torch-version }})"
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git \
            libgl1 \
            libxcb1 \
            ninja-build
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Pin torch version
        run: |
          cat >> pyproject.toml <<EOF

          [tool.uv]
          constraint-dependencies = ["torch==${{ matrix.torch-version }}"]
          build-constraint-dependencies = ["torch==${{ matrix.torch-version }}"]
          EOF
      - name: Install project
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest

  build:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:${{ matrix.cuda-version }}-devel-ubuntu24.04 # TODO: use custom image which contains all build dependencies
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    env:
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;9.0;10.0;12.0+PTX"
    strategy:
      fail-fast: false
      matrix: *torch-matrix
    name: "build (py${{ matrix.python-version }}, torch ${{ matrix.torch-version }})"
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git \
            libgl1 \
            libxcb1 \
            ninja-build
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Pin torch version
        run: |
          cat >> pyproject.toml <<EOF

          [tool.uv]
          build-constraint-dependencies = ["torch==${{ matrix.torch-version }}"]
          EOF
      - name: Set BUILD_VERSION
        run: echo "BUILD_VERSION=$(cat version.txt)+${{ matrix.cuda-tag }}" >> "$GITHUB_ENV"
      - name: Build
        run: uv build
      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          archive: false
          if-no-files-found: error
          retention-days: 5
          path: dist/*.whl
