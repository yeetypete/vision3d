name: build

on:
  workflow_call:
    inputs:
      version:
        description: "Version of the produced wheels and sdist (e.g. 0.1.0)."
        type: string
        required: true
      cache:
        description: "Whether the build should be cached."
        type: boolean
        default: true

permissions: {}

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    # Build with the oldest CUDA toolkit we support (CUDA 12.8) inside PyTorch's
    # manylinux_2_28 builder image. The resulting wheel is tagged
    # manylinux_2_28_x86_64, and runs on any NVIDIA driver that supports the
    # CUDA 12.8 toolkit or newer (Linux driver ≥ 570; newer CUDA majors are
    # covered by driver backward compatibility).
    container:
      image: pytorch/manylinux2_28-builder:cuda12.8
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    env:
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;9.0;10.0;12.0+PTX"
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          python-version: "3.12"
          enable-cache: ${{ inputs.cache }}
          cache-local-path: ${{ github.workspace }}/.uv-cache
          cache-suffix: build
      - name: Set BUILD_VERSION
        run: echo "BUILD_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - name: Build
        # Pull torch from PyTorch's cu128 index to match this container's CUDA
        # toolkit (PyPI's default is cu130).
        run: uv build --index https://download.pytorch.org/whl/cu128
      - name: Repair wheel
        # `uv build` tags the wheel `linux_x86_64`; PyPI requires a manylinux
        # tag. The build image is manylinux_2_28-compliant, so retag without
        # bundling shared libs (torch libs are resolved at runtime against the
        # user's installed PyTorch).
        run: |
          uvx auditwheel repair \
            --plat manylinux_2_28_x86_64 \
            --only-plat \
            --exclude '*' \
            --wheel-dir dist \
            dist/*-linux_x86_64.whl
          rm dist/*-linux_x86_64.whl
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          if-no-files-found: error
          retention-days: 5
          path: dist
