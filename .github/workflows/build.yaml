name: build

on:
  workflow_call:
    inputs:
      version:
        description: "Version of the produced wheels and sdist (e.g. 0.1.0)."
        type: string
        required: true
      cache:
        description: "Whether the build should be cached."
        type: boolean
        default: true

permissions: {}

jobs:
  build-wheels:
    name: "build-wheel (py${{ matrix.python-version }}, torch ${{ matrix.torch-version }}+${{ matrix.cuda-tag }})"
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:${{ matrix.cuda-version }}-devel-ubuntu24.04
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    env:
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;9.0;10.0;12.0+PTX"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        torch-version: ["2.10.0", "2.11.0"]
        include:
          - torch-version: "2.10.0"
            cuda-version: "12.8.1"
            cuda-tag: "cu128"
          - torch-version: "2.11.0"
            cuda-version: "13.0.2"
            cuda-tag: "cu130"
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxcb1 \
            libxext6 \
            libxrender1 \
            ninja-build
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: ${{ inputs.cache }}
          cache-local-path: ${{ github.workspace }}/.uv-cache
          cache-suffix: build-wheel-torch-${{ matrix.torch-version }}+${{ matrix.cuda-tag }}
      - name: Pin torch version
        run: |
          cat >> pyproject.toml <<EOF

          [tool.uv]
          build-constraint-dependencies = ["torch==${{ matrix.torch-version }}"]
          EOF
      - name: Set BUILD_VERSION
        run: echo "BUILD_VERSION=${{ inputs.version }}+${{ matrix.cuda-tag }}" >> "$GITHUB_ENV"
      - name: Build wheel
        run: uv build --wheel
      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-py${{ matrix.python-version }}-torch${{ matrix.torch-version }}-${{ matrix.cuda-tag }}
          if-no-files-found: error
          retention-days: 5
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: ${{ inputs.cache }}
          cache-suffix: build-sdist
      - name: Set BUILD_VERSION
        run: echo "BUILD_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - name: Build sdist
        run: uv build --sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          if-no-files-found: error
          retention-days: 5
          path: dist/*.tar.gz
