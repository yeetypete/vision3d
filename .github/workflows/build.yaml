name: build

on:
  workflow_call:
    inputs:
      version:
        description: "Version of the produced wheels and sdist (e.g. 0.1.0)."
        type: string
        required: true
      cache:
        description: "Whether the build should be cached."
        type: boolean
        default: true

permissions: {}

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    # Build with the oldest CUDA toolkit we support (CUDA 12.8). Combined with the
    # static cudart linkage configured in `setup.py`, the resulting wheel
    # has no `libcudart.so.<MAJOR>` SONAME dependency and runs on any NVIDIA
    # driver that supports the CUDA 12.8 toolkit or newer (Linux driver ≥ 570;
    # newer CUDA majors are covered by driver backward compatibility).
    container:
      image: nvidia/cuda:12.8.1-devel-ubuntu24.04
      volumes:
        - /usr/share/dotnet:/host/dotnet
        - /usr/local/lib/android:/host/android
        - /opt/hostedtoolcache:/host/hostedtoolcache
    permissions:
      contents: read
    env:
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;9.0;10.0;12.0+PTX"
    steps:
      - name: Free disk space
        shell: bash
        run: |
          shopt -s dotglob
          rm -rf /host/dotnet/* &
          rm -rf /host/android/* &
          rm -rf /host/hostedtoolcache/* &
          wait
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git \
            ninja-build
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          python-version: "3.12"
          enable-cache: ${{ inputs.cache }}
          cache-local-path: ${{ github.workspace }}/.uv-cache
          cache-suffix: build
      - name: Set BUILD_VERSION
        run: echo "BUILD_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
      - name: Build
        # Pull torch from PyTorch's cu128 index to match this container's CUDA
        # toolkit (PyPI's default is cu130).
        run: uv build --index https://download.pytorch.org/whl/cu128
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          if-no-files-found: error
          retention-days: 5
          path: dist
